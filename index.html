<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #2a2f42;
    --accent: #7c6af7;
    --accent2: #4fd1c5;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0a0c10;
    --green: #4ade80;
    --yellow: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  textarea {
    width: 100%;
    min-height: 160px;
    padding: 16px;
    background: var(--code-bg);
    border: none;
    outline: none;
    resize: vertical;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    tab-size: 2;
  }

  textarea::placeholder { color: var(--muted); }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  button {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 700;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6b5ce7; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .btn-copy {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 5px 14px;
    font-size: 0.72rem;
  }
  .btn-copy:hover { background: rgba(79,209,197,0.1); }
  .btn-copy.copied { color: var(--green); border-color: var(--green); }

  /* Output area */
  #output-wrap { display: none; }

  .output-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge-json  { background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
  .badge-text  { background: rgba(79,209,197,0.15);  color: var(--accent2); border: 1px solid rgba(79,209,197,0.3); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* JSON viewer */
  #json-out {
    padding: 16px;
    background: var(--code-bg);
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.8;
    white-space: pre;
    max-height: 520px;
    overflow-y: auto;
  }

  /* text output */
  #text-out {
    padding: 16px 20px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.95rem;
    line-height: 1.9;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* JSON syntax highlight */
  .jk { color: #79c0ff; }   /* key */
  .js { color: #a5d6ff; }   /* string value */
  .jn { color: #ffa657; }   /* number */
  .jb { color: #ff7b72; }   /* bool/null */
  .jp { color: #8b949e; }   /* punctuation */

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--code-bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* error */
  .error-msg {
    padding: 12px 16px;
    background: rgba(255,123,114,0.1);
    border-left: 3px solid #ff7b72;
    color: #ff7b72;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    border-radius: 0 6px 6px 0;
    margin: 12px 16px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>// Unicode Decoder</h1>
    <p>วาง Unicode escape sequence แล้วกด Decode — ถ้าเป็น JSON จะ format ให้อัตโนมัติ</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="card-label">INPUT</span>
      <span class="char-count" id="in-count">0 chars</span>
    </div>
    <textarea id="input" placeholder='วางโค้ด Unicode ที่นี่ เช่น {"\u0066\u006f\u0072\u006d\u0061\u0074..."}'></textarea>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="decode()">⚡ Decode</button>
    <button class="btn-secondary" onclick="clearAll()">✕ Clear</button>
  </div>

  <div id="output-wrap">
    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="card-label">OUTPUT</span>
          <span id="type-badge"></span>
        </div>
        <button class="btn-copy" id="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
      <div id="json-out"></div>
      <div id="text-out"></div>
      <div id="error-out"></div>
    </div>
  </div>
</div>

<script>
const inputEl   = document.getElementById('input');
const inCount   = document.getElementById('in-count');
const outputWrap = document.getElementById('output-wrap');
const jsonOut   = document.getElementById('json-out');
const textOut   = document.getElementById('text-out');
const errorOut  = document.getElementById('error-out');
const typeBadge = document.getElementById('type-badge');

inputEl.addEventListener('input', () => {
  inCount.textContent = inputEl.value.length + ' chars';
});

function decode() {
  const raw = inputEl.value.trim();
  if (!raw) return;

  // Step 1: decode unicode escapes
  let decoded;
  try {
    decoded = raw.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) =>
      String.fromCharCode(parseInt(hex, 16))
    );
  } catch(e) {
    showError('Decode error: ' + e.message);
    return;
  }

  outputWrap.style.display = 'block';
  jsonOut.style.display  = 'none';
  textOut.style.display  = 'none';
  errorOut.innerHTML     = '';

  // Step 2: try parse as JSON
  try {
    const obj = JSON.parse(decoded);
    const pretty = JSON.stringify(obj, null, 2);
    jsonOut.style.display = 'block';
    jsonOut.innerHTML = highlight(pretty);
    typeBadge.innerHTML = '<span class="output-type-badge badge-json"><span class="badge-dot"></span>JSON</span>';
    textOut._raw = pretty;
  } catch(e) {
    // Not JSON — show as plain text
    textOut.style.display = 'block';
    textOut.textContent = decoded;
    typeBadge.innerHTML = '<span class="output-type-badge badge-text"><span class="badge-dot"></span>TEXT</span>';
    textOut._raw = decoded;
  }
}

function highlight(json) {
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*")\s*:/g,
      m => `<span class="jk">${m}</span>`)
    .replace(/:\s*("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*")/g,
      (m, s) => `: <span class="js">${s}</span>`)
    .replace(/:\s*(\-?\d+\.?\d*([eE][+\-]?\d+)?)/g,
      (m, n) => `: <span class="jn">${n}</span>`)
    .replace(/:\s*(true|false|null)/g,
      (m, b) => `: <span class="jb">${b}</span>`)
    .replace(/([{}\[\],])/g,
      m => `<span class="jp">${m}</span>`);
}

function showError(msg) {
  outputWrap.style.display = 'block';
  jsonOut.style.display  = 'none';
  textOut.style.display  = 'none';
  errorOut.innerHTML = `<div class="error-msg">${msg}</div>`;
  typeBadge.innerHTML = '';
}

function clearAll() {
  inputEl.value = '';
  inCount.textContent = '0 chars';
  outputWrap.style.display = 'none';
  jsonOut.innerHTML  = '';
  textOut.textContent = '';
  errorOut.innerHTML  = '';
}

function copyOutput() {
  const raw = textOut._raw || jsonOut.textContent || textOut.textContent;
  navigator.clipboard.writeText(raw).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// allow decode with Ctrl+Enter
inputEl.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') decode();
});
</script>
</body>
</html>
